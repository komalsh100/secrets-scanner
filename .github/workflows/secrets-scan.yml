name: Secrets Scanner

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  scan-secrets:
    name: Scan for Hardcoded Secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git scanning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Secrets Scanner
        run: pip install -e .

      - name: Run Secrets Scanner
        run: |
          secrets-scanner . \
            --git-history \
            --severity high \
            --output secrets-report.json \
            --html secrets-report.html \
            --fail-on-critical \
            --exclude "*.test.*" \
            --exclude "tests/*"

      - name: Upload JSON Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-scan-report-json
          path: secrets-report.json

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-scan-report-html
          path: secrets-report.html

      - name: Comment PR with findings
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('secrets-report.json')) return;
            const report = JSON.parse(fs.readFileSync('secrets-report.json', 'utf8'));
            const meta = report.scan_metadata;
            const findings = report.findings;

            let body = `## 🔍 Secrets Scanner Results\n\n`;
            body += `| Metric | Value |\n|--------|-------|\n`;
            body += `| Files Scanned | ${meta.scanned_files} |\n`;
            body += `| Total Findings | ${meta.total_findings} |\n`;
            body += `| 🔴 Critical | ${meta.findings_by_severity.CRITICAL} |\n`;
            body += `| 🟠 High | ${meta.findings_by_severity.HIGH} |\n`;
            body += `| 🟡 Medium | ${meta.findings_by_severity.MEDIUM} |\n\n`;

            if (findings.length > 0) {
              body += `### Findings\n\n`;
              body += `| Severity | Type | File | Line |\n|----------|------|------|------|\n`;
              findings.slice(0, 20).forEach(f => {
                const sev = f.severity === 'CRITICAL' ? '🔴 CRITICAL' :
                            f.severity === 'HIGH'     ? '🟠 HIGH'     :
                            f.severity === 'MEDIUM'   ? '🟡 MEDIUM'   : '🟢 LOW';
                body += `| ${sev} | ${f.name} | \`${f.file.split('/').pop()}\` | ${f.line} |\n`;
              });
              if (findings.length > 20) body += `\n_...and ${findings.length - 20} more findings. See full report artifact._\n`;
              body += `\n> ⚠️ **Action Required:** Please review and remediate secrets before merging.\n`;
            } else {
              body += `✅ **No secrets detected.** This PR looks clean!\n`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
